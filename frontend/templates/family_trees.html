{% extends 'base.html' %}

{% block title %}族谱与成员管理{% endblock %}

{% block content %}
<h1>族谱与成员管理</h1>
<section class="panel">
  <h2>我的可见族谱</h2>
  <table class="table">
    <thead>
      <tr>
        <th>族谱ID</th>
        <th>族谱名称</th>
        <th>身份</th>
        <th>操作</th>
      </tr>
    </thead>
    <tbody>
      {% for tree in trees %}
      <tr>
        <td>{{ tree.id }}</td>
        <td>{{ tree.name }}</td>
        <td>{{ tree.role }}</td>
        <td>
          <button class="small">编辑</button>
          <button class="small warn">删除</button>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
  <p class="todo">TODO: 接入族谱 CRUD 接口，且后端需按当前用户权限过滤可见族谱。</p>
</section>

<section class="panel two-col">
  <div>
    <h2>新增/编辑族谱</h2>
    <form class="form" data-todo="TODO: 族谱新增/修改接口未接入（POST/PUT /api/family-trees）">
      <label>族谱名称<input type="text" name="tree_name" required /></label>
      <label>描述<textarea name="description" rows="3"></textarea></label>
      <button type="submit">保存族谱</button>
    </form>
  </div>

  <div>
    <h2>邀请协作者</h2>
    <form class="form" data-todo="TODO: 邀请接口未接入（POST /api/family-trees/{id}/invites）">
      <label>族谱ID<input type="number" name="tree_id" required /></label>
      <label>受邀用户邮箱<input type="email" name="invitee_email" required /></label>
      <button type="submit">发送邀请</button>
    </form>
  </div>
</section>

<section class="panel">
  <h2>成员管理与模糊查找</h2>
  <form class="form inline" data-todo="TODO: 成员模糊查找接口未接入（GET /api/members?name_like=关键词）">
    <label>姓名关键词<input type="text" name="keyword" placeholder="例如：张文" /></label>
    <button type="submit">查找成员</button>
  </form>

  <form class="form" data-todo="TODO: 成员 CRUD 接口未接入（POST/PUT/DELETE /api/members）">
    <label>成员姓名<input type="text" name="member_name" required /></label>
    <label>性别
      <select name="gender">
        <option value="male">男</option>
        <option value="female">女</option>
      </select>
    </label>
    <label>父亲ID<input type="number" name="father_id" /></label>
    <label>母亲ID<input type="number" name="mother_id" /></label>
    <button type="submit">新增成员</button>
  </form>

  <div id="search-result" class="result-box">成员搜索结果将显示在这里。</div>
</section>
{% endblock %}
