{% extends 'base.html' %}

{% block title %}祖先与亲缘查询{% endblock %}

{% block content %}
<h1>祖先与亲缘关系查询</h1>

<section class="panel two-col">
  <div>
    <h2>人物祖先查询</h2>
    <form class="form" data-todo="TODO: 祖先查询接口未接入（GET /api/queries/ancestors?member_id=）">
      <label>人物ID<input type="number" name="ancestor_member_id" required /></label>
      <button type="submit">查询祖先树</button>
    </form>
    <div class="result-box">祖先树结果会以树状图显示在这里。</div>
  </div>

  <div>
    <h2>人物亲缘关系查询</h2>
    <form class="form" data-todo="TODO: 亲缘关系路径查询接口未接入（GET /api/queries/relationship?from_id=&to_id=）">
      <label>人物A ID<input type="number" name="from_id" required /></label>
      <label>人物B ID<input type="number" name="to_id" required /></label>
      <button type="submit">查询关系通路</button>
    </form>
    <div class="result-box">若存在亲缘关系，路径结果将显示在这里。</div>
  </div>
</section>
{% endblock %}
