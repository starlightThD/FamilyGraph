{% extends 'base.html' %}

{% block title %}Log In{% endblock %}

{% block page_header %}
<div class="page-header">
  <div>
    <p class="eyebrow">Account</p>
    <h1>Log In</h1>
    <p class="page-subtitle">Authentication is required before accessing any page. Current dev mode checks identity only.</p>
  </div>
</div>
{% endblock %}

{% block content %}
<section class="panel auth-card">
  {% if message %}
  <div class="result-box">{{ message }}</div>
  {% endif %}
  <form class="form" method="post">
    <label>Email or Username<input type="text" name="username" required /></label>
    <label>Password (optional for now)<input type="password" name="password" /></label>
    <button type="submit" class="btn">Log In</button>
  </form>
</section>
{% endblock %}
