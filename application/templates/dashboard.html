{% extends 'base.html' %}

{% block title %}Dashboard{% endblock %}

{% block content %}
<h1>Dashboard</h1>
<div class="stats-grid">
  <article class="stat-card">
    <h2>家族总人数</h2>
    <p>{{ stats.total_members }}</p>
  </article>
  <article class="stat-card">
    <h2>男性人数</h2>
    <p>{{ stats.male_count }}</p>
  </article>
  <article class="stat-card">
    <h2>女性人数</h2>
    <p>{{ stats.female_count }}</p>
  </article>
  <article class="stat-card">
    <h2>男女比例</h2>
    <p>{{ stats.male_count }} : {{ stats.female_count }}</p>
  </article>
</div>
<p class="todo">TODO: 统计数据改为后端实时聚合结果，并支持按族谱筛选。</p>
{% endblock %}
