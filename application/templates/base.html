<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}FamilyGraph{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">FamilyGraph</div>
      <nav class="nav">
        <a href="{{ url_for('home') }}">首页</a>
        <a href="{{ url_for('login') }}">登录</a>
        <a href="{{ url_for('register') }}">注册</a>
        <a href="{{ url_for('dashboard') }}">Dashboard</a>
        <a href="{{ url_for('family_trees') }}">族谱管理</a>
        <a href="{{ url_for('tree_preview') }}">树形预览</a>
        <a href="{{ url_for('queries') }}">关系查询</a>
      </nav>
      <div class="role-indicator">
        当前身份：{{ '管理员' if viewer_role == 'admin' else '游客' }}
      </div>
    </header>

    <main class="page">
      {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  </body>
</html>
